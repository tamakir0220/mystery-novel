<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a0a1e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- 門のモチーフ -->
  <rect x="150" y="120" width="100" height="160" fill="none" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="120" x2="200" y2="280" stroke="#c4a35a" stroke-width="0.8" opacity="0.4"/>
  <rect x="140" y="110" width="120" height="15" fill="none" stroke="#c4a35a" stroke-width="1" opacity="0.4"/>
  <!-- 鍵穴 -->
  <circle cx="190" cy="200" r="5" fill="none" stroke="#c4a35a" stroke-width="1" opacity="0.6"/>
  <line x1="190" y1="205" x2="190" y2="215" stroke="#c4a35a" stroke-width="1" opacity="0.6"/>
  <!-- シャンデリア -->
  <line x1="200" y1="80" x2="200" y2="100" stroke="#c4a35a" stroke-width="0.5" opacity="0.3"/>
  <path d="M180,100 Q200,110 220,100" fill="none" stroke="#c4a35a" stroke-width="0.8" opacity="0.4"/>
  <line x1="185" y1="100" x2="183" y2="108" stroke="#c4a35a" stroke-width="0.5" opacity="0.3"/>
  <line x1="215" y1="100" x2="217" y2="108" stroke="#c4a35a" stroke-width="0.5" opacity="0.3"/>

  <text x="200" y="380" font-family="serif" font-size="30" fill="#e8e6e0" text-anchor="middle">始まりの物語</text>
  <text x="200" y="420" font-family="serif" font-size="15" fill="#8888a0" text-anchor="middle">みかん（監修：りんご）</text>
  <line x1="120" y1="440" x2="280" y2="440" stroke="#c4a35a" stroke-width="0.5" opacity="0.4"/>
</svg>
