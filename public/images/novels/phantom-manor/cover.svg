<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0a1a"/>
      <stop offset="100%" style="stop-color:#1a1020"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Manor silhouette -->
  <rect x="130" y="160" width="140" height="100" fill="none" stroke="#c4a35a" stroke-width="1" opacity="0.7"/>
  <polygon points="130,160 200,110 270,160" fill="none" stroke="#c4a35a" stroke-width="1" opacity="0.7"/>
  <rect x="150" y="190" width="20" height="25" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
  <rect x="190" y="190" width="20" height="25" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
  <rect x="230" y="190" width="20" height="25" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.5"/>
  <rect x="185" y="230" width="30" height="30" fill="none" stroke="#c4a35a" stroke-width="1" opacity="0.8"/>
  <!-- Fog lines -->
  <line x1="80" y1="260" x2="320" y2="260" stroke="#8888a0" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="270" x2="340" y2="270" stroke="#8888a0" stroke-width="0.3" opacity="0.2"/>
  <text x="200" y="380" font-family="serif" font-size="32" fill="#e8e6e0" text-anchor="middle">幻影の館</text>
  <text x="200" y="420" font-family="serif" font-size="16" fill="#8888a0" text-anchor="middle">夜霧 蓮</text>
  <line x1="120" y1="440" x2="280" y2="440" stroke="#c4a35a" stroke-width="0.5" opacity="0.4"/>
</svg>
