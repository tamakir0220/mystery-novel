<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0818"/>
      <stop offset="100%" style="stop-color:#18081a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- 坂のモチーフ -->
  <line x1="120" y1="260" x2="280" y2="180" stroke="#c4a35a" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="270" x2="280" y2="190" stroke="#c4a35a" stroke-width="0.5" opacity="0.25"/>
  <!-- 街灯 -->
  <line x1="250" y1="120" x2="250" y2="185" stroke="#c4a35a" stroke-width="1" opacity="0.4"/>
  <circle cx="250" cy="115" r="8" fill="none" stroke="#c4a35a" stroke-width="0.8" opacity="0.5"/>
  <!-- K.Hの文字 -->
  <text x="180" y="240" font-family="serif" font-size="28" fill="#c4a35a" opacity="0.35">K.H</text>
  <!-- 人の影（倒れた姿） -->
  <ellipse cx="170" cy="260" rx="20" ry="6" fill="none" stroke="#c4a35a" stroke-width="0.8" opacity="0.3"/>
  <!-- 足跡 -->
  <ellipse cx="220" cy="200" rx="4" ry="6" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="235" cy="195" rx="4" ry="6" fill="none" stroke="#c4a35a" stroke-width="0.5" opacity="0.2"/>

  <text x="200" y="380" font-family="serif" font-size="26" fill="#e8e6e0" text-anchor="middle">帝町転落事件</text>
  <text x="200" y="420" font-family="serif" font-size="15" fill="#8888a0" text-anchor="middle">みかん（監修：りんご）</text>
  <line x1="120" y1="440" x2="280" y2="440" stroke="#c4a35a" stroke-width="0.5" opacity="0.4"/>
</svg>
