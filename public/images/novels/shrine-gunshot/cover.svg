<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0815"/>
      <stop offset="100%" style="stop-color:#1a0a18"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- 鳥居のモチーフ -->
  <line x1="155" y1="130" x2="155" y2="260" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <line x1="245" y1="130" x2="245" y2="260" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="140" x2="260" y2="140" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <path d="M135,130 Q200,115 265,130" fill="none" stroke="#c4a35a" stroke-width="1.5" opacity="0.5"/>
  <line x1="165" y1="165" x2="235" y2="165" stroke="#c4a35a" stroke-width="0.8" opacity="0.35"/>
  <!-- 提灯 -->
  <ellipse cx="175" cy="185" rx="8" ry="12" fill="none" stroke="#c4a35a" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="225" cy="185" rx="8" ry="12" fill="none" stroke="#c4a35a" stroke-width="0.8" opacity="0.4"/>
  <!-- 闇の中の銃口の閃光 -->
  <circle cx="200" cy="230" r="5" fill="none" stroke="#c4a35a" stroke-width="1.5" opacity="0.6"/>
  <line x1="192" y1="222" x2="188" y2="218" stroke="#c4a35a" stroke-width="0.6" opacity="0.4"/>
  <line x1="208" y1="222" x2="212" y2="218" stroke="#c4a35a" stroke-width="0.6" opacity="0.4"/>
  <line x1="200" y1="220" x2="200" y2="215" stroke="#c4a35a" stroke-width="0.6" opacity="0.4"/>

  <text x="200" y="380" font-family="serif" font-size="28" fill="#e8e6e0" text-anchor="middle">帝神社の銃声</text>
  <text x="200" y="420" font-family="serif" font-size="15" fill="#8888a0" text-anchor="middle">みかん（監修：りんご）</text>
  <line x1="120" y1="440" x2="280" y2="440" stroke="#c4a35a" stroke-width="0.5" opacity="0.4"/>
